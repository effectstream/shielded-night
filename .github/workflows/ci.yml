name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPACT_VERSION: '0.31.1'

jobs:
  unit:
    name: Unit tests (simulator)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2

      - name: Setup Compact compiler
        uses: midnightntwrk/setup-compact-action@b622629bee2c06d0f8b4db5b62a93f98dcbd41bf
        with:
          compact-version: ${{ env.COMPACT_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Contract JS only (--skip-zk): the simulator tests don't need prover keys.
      - name: Compile contract
        run: bun run compact:fast

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test:unit

  integration:
    name: Integration tests (docker stack)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2

      - name: Setup Compact compiler
        uses: midnightntwrk/setup-compact-action@b622629bee2c06d0f8b4db5b62a93f98dcbd41bf
        with:
          compact-version: ${{ env.COMPACT_VERSION }}

      # docker.io rate-limits anonymous pulls from shared runners; the Google
      # mirror serves the same images without the limit (canary's pattern).
      - name: Prefer Google mirror for Docker pulls
        run: |
          echo '{"registry-mirrors":["https://mirror.gcr.io"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Full compile including prover/verifier keys — the proof server needs
      # them. Cached on the contract source + compiler version.
      - name: Cache compiled contract
        id: compact-cache
        uses: actions/cache@v4
        with:
          path: src/managed
          key: compact-${{ env.COMPACT_VERSION }}-${{ hashFiles('src/shielded-night.compact') }}

      - name: Compile contract
        if: steps.compact-cache.outputs.cache-hit != 'true'
        run: bun run compact

      - name: Run integration tests
        run: bun run test:integration
        env:
          MN_ENV: undeployed

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: reports/vitest-results.json
          if-no-files-found: ignore
